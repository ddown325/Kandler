# Kandler — Deploy to GitHub Pages
#
# Builds the Next.js static export and pushes it to a `gh-pages` branch.
# This works with GitHub's DEFAULT Pages setting (Deploy from a branch →
# gh-pages → root) — no manual config required.
#
# The site goes live at: https://ddown325.github.io/Kandler/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build static export
        run: bun run build:pages
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /Kandler

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Verify build output
        run: |
          if [ ! -f out/index.html ]; then
            echo "ERROR: out/index.html not found! Build failed."
            exit 1
          fi
          if [ ! -d out/_next ]; then
            echo "ERROR: out/_next/ not found! Assets won't load."
            exit 1
          fi
          echo "✓ Build output verified"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
          enable_jekyll: false
