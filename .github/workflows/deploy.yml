# Kandler — Deploy to GitHub Pages
# Builds the Next.js static export and publishes it to GitHub Pages.
#
# Repository setup (one-time):
#   1. Push this repo to https://github.com/ddown325/Kandler
#   2. In repo Settings → Pages → Source, select "GitHub Actions"
#      (NOT "Deploy from a branch" — that would serve your README instead!)
#   3. Push to main → this workflow runs and deploys
#
# The site goes live at: https://ddown325.github.io/Kandler/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build static export
        run: bun run build:pages
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /Kandler

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Verify build output
        run: |
          echo "=== Build output verification ==="
          ls -la out/
          if [ ! -f out/index.html ]; then
            echo "ERROR: out/index.html not found! Build failed."
            exit 1
          fi
          SIZE=$(wc -c < out/index.html)
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: out/index.html is only $SIZE bytes — looks broken"
            exit 1
          fi
          echo "✓ out/index.html exists ($SIZE bytes)"
          if [ ! -f out/icon.png ]; then
            echo "ERROR: out/icon.png not found!"
            exit 1
          fi
          echo "✓ out/icon.png exists"
          if [ ! -d out/_next ]; then
            echo "ERROR: out/_next/ directory not found! JS/CSS won't load."
            exit 1
          fi
          echo "✓ out/_next/ directory exists"
          echo "=== Verification passed ==="

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
