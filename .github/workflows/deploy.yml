# Kandler — Deploy to GitHub Pages
# Builds the Next.js static export and publishes it to GitHub Pages.
#
# Repository setup (one-time):
#   1. Push this repo to https://github.com/ddown325/Kandler
#   2. In repo Settings → Pages → Source, select "GitHub Actions"
#   3. Push to main → this workflow runs and deploys
#
# The site goes live at: https://ddown325.github.io/Kandler/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build static export
        run: bun run build:pages
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /Kandler

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
